slides:
  hook:
    marker: 退去立会いで後悔する人へ
    main: "その場で\nサインしたら終わり"
    big_num: "3"
    big_unit: つのNG行動
    sub: 知らずに損している人がまだ多い

  problem:
    marker: よくある失敗パターン
    main: "その場でサイン\n→ 後から交渉できない"
    warn: "動画撮影なし → 証拠が残らない\n発言メモなし → 「言ってない」が通る"
    sub: 全国で年間9万件の賃貸トラブル相談

  solution:
    marker: 立会いで必ずやること
    main: "「持ち帰って\n確認します」"
    steps:
      - その場でサインしない（即決義務なし）
      - 全室を動画撮影する（壁・床・天井）
      - 担当者の発言をメモ・録音する
      - 精算書はガイドラインと照らし合わせる
    foot: 交渉した人の82%が減額に成功

  cta:
    marker: 詳しくはこちら
    main: "自分でやる\nサポート付き"
    sub: "全手順・プロンプト公開中\nサポートプランもあります"
    btn: ▶ プロフのリンクへ
