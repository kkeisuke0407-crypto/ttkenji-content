output: reel_14_haraenai.mp4

slides:
  hook:
    marker: 退去費用が払えない人へ
    main: "放置は\n最悪の選択です"
    big_num: "3"
    big_unit: つのリスク
    sub: 無視するほど状況が悪化する

  problem:
    marker: 放置すると起きること
    main: "代位弁済\n→ 信用情報に傷"
    warn: "次の賃貸が借りられなくなる\n少額訴訟に発展するケースも"
    sub: 全国で年間9万件の賃貸トラブル相談

  solution:
    marker: まずこの順番で動く
    main: "金額が\n正しいか確認する"
    steps:
      - まず請求書の内訳を確認する
      - 188（消費生活センター）に無料相談
      - 不当な項目は交渉で減額できるケースがある
      - 交渉した人の82%が減額に成功
    foot: 払えないと思った金額が変わることがある

  cta:
    marker: 詳しくはこちら
    main: "自分でやる\nサポート付き"
    sub: "全手順・プロンプト公開中\nサポートプランもあります"
    btn: ▶ プロフのリンクへ
